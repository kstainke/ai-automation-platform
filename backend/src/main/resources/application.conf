ktor {
    application {
        modules = [com.aiautomation.ApplicationKt.module]
    }
    deployment {
        port = 8080
        host = "0.0.0.0"
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/aiplatform"
    url = ${?DATABASE_URL}
    user = "postgres"
    user = ${?DATABASE_USER}
    password = "postgres"
    password = ${?DATABASE_PASSWORD}
}

jwt {
    secret = "change-me-in-production"
    secret = ${?JWT_SECRET}
    issuer = "ai-automation-platform"
    audience = "ai-automation-platform"
    expiration = 86400000 # 24 hours in ms
    refreshExpiryMs = 604800000 # 7 days in ms
}

openai {
    apiKey = ""
    apiKey = ${?OPENAI_API_KEY}
}

anthropic {
    apiKey = ""
    apiKey = ${?ANTHROPIC_API_KEY}
}
